let readUrls = new Set();

function escapeHtml(s) {
  if (!s) return '';
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

function saveReadState() {
  var today = new Date();
  var key = 'zhibo8_read_' + today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  localStorage.setItem(key, JSON.stringify(Array.from(readUrls)));
}

function loadReadState() {
  var today = new Date();
  var key = 'zhibo8_read_' + today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  var saved = localStorage.getItem(key);
  if (saved) {
    try { var arr = JSON.parse(saved); if (Array.isArray(arr)) { readUrls = new Set(arr); } } catch(e) {}
  }
}

function markAsRead(btnEl, url) {
  readUrls.add(url);
  saveReadState();
  var cardEl = btnEl.closest('.card');
  if (!cardEl) return;
  var titleEl = cardEl.querySelector('.card-headline');
  var titleText = titleEl ? titleEl.textContent : '';
  var linkEl = titleEl ? titleEl.querySelector('a') : null;
  var linkHref = linkEl ? linkEl.getAttribute('href') : '#';
  cardEl.style.cssText = 'background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:10px 14px;margin-bottom:6px;opacity:0.5;cursor:default;animation:none;transition:none;overflow:hidden;';
  cardEl.innerHTML = '<div style="display:flex;align-items:center;gap:8px;">' +
    '<a href="' + linkHref + '" target="_blank" style="flex:1;font-size:13px;color:#78909c;text-decoration:none;line-height:1.4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:auto;">' + escapeHtml(titleText) + '</a>' +
    '<span style="color:#66bb6a;font-size:11px;white-space:nowrap;">✓ 已读</span>' +
    '</div>';
  var nextCard = cardEl.nextElementSibling;
  while (nextCard && !nextCard.classList.contains('card')) { nextCard = nextCard.nextElementSibling; }
  if (nextCard) {
    requestAnimationFrame(function() {
      var targetY = nextCard.getBoundingClientRect().top + window.pageYOffset - 8;
      window.scrollTo({ top: targetY, behavior: 'smooth' });
    });
  }
  updateStats();
}

function clearReadArticles() {
  if (readUrls.size === 0) { showInfo('当前没有已读资讯'); return; }
  const count = readUrls.size;
  readUrls.clear();
  renderAllCards();
  showInfo('已清除 ' + count + ' 篇已读资讯');
}

function updateStats() {
  const visible = INITIAL_DATA.filter(a => !readUrls.has(a.url));
  const totalC = visible.reduce((s, a) => s + a.commentCount, 0);
  const maxC = visible.length > 0 ? Math.max(...visible.map(a => a.commentCount)) : 0;
  document.getElementById('statCount').textContent = visible.length;
  document.getElementById('statComments').textContent = totalC;
  document.getElementById('statMax').textContent = maxC;
  document.getElementById('statRead').textContent = readUrls.size;
}

function showInfo(msg) {
  const el = document.getElementById('infoMsg');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function parseArticleTime(timeStr) {
  if (!timeStr) return 0;
  var now = new Date();
  var m = timeStr.match(/^(\d{1,2})-(\d{1,2})\s+(\d{1,2}):(\d{2})$/);
  if (m) {
    return new Date(now.getFullYear(), parseInt(m[1]) - 1, parseInt(m[2]), parseInt(m[3]), parseInt(m[4])).getTime();
  }
  m = timeStr.match(/^(\d{1,2}):(\d{2})$/);
  if (m) {
    return new Date(now.getFullYear(), now.getMonth(), now.getDate(), parseInt(m[1]), parseInt(m[2])).getTime();
  }
  return 0;
}

function refreshData() {
  // 清除缓存并重新加载，获取最新数据快照
  // 数据通过 GitHub Actions 每小时自动更新
  var btn = document.getElementById('refreshBtn');
  var txtEl = document.getElementById('refreshText');
  btn.disabled = true;
  txtEl.textContent = '正在获取...';
  
  // 强制从服务器重新加载，绕过浏览器缓存
  fetch(window.location.href, { cache: 'reload' })
    .then(() => {
      location.reload(true);
    })
    .catch(() => {
      location.reload();
    });
}

function renderAllCards() {
  const container = document.getElementById('cardsContainer');
  let html = '';
  let idx = 0;

  INITIAL_DATA.forEach(article => {
    var isRead = readUrls.has(article.url);
    idx++;

    if (isRead) {
      html += '<div class="card" data-url="' + escapeHtml(article.url) + '" style="background:rgba(255,255,255,0.03);opacity:0.5;animation:none;transition:none;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-radius:8px;margin-bottom:8px;">' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-size:13px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(article.title) + '</div>' +
        '</div>' +
        '<div style="font-size:12px;color:#4ecdc4;white-space:nowrap;margin-left:10px;flex-shrink:0;">✓ 已读</div>' +
      '</div>';
      return;
    }

    const commentsHtml = (article.hotComments || []).map(c =>
      '<div class="comment-item">💬 <span class="comment-likes-badge">' + c.likes + '赞</span> <strong>' + escapeHtml(c.user) + '：</strong>' + escapeHtml(c.content) + '</div>'
    ).join('');

    html += '<div class="card" data-url="' + escapeHtml(article.url) + '" style="animation-delay:' + ((idx % 5) * 0.06) + 's">' +
      '<div class="card-top-row">' +
        '<div class="card-badge">' + idx + '</div>' +
        '<div class="card-top-right">' +
          '<div class="card-meta-top">' +
            '<span class="meta-tag hot">🔥 ' + article.commentCount + ' 评</span>' +
            '<span class="meta-tag time">🕐 ' + escapeHtml(article.time || '') + '</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card-headline"><a href="' + escapeHtml(article.url) + '" target="_blank">【爆点标题】' + escapeHtml(article.title) + '</a></div>' +
      (article.summary ? '<div class="ai-summary"><div class="ai-summary-label">【资讯摘要】</div><div class="ai-summary-text">' + escapeHtml(article.summary) + '</div></div>' : '') +
      (commentsHtml ? '<div class="comments-divider">【神评摘录】</div><div class="comments-section">' + commentsHtml + '</div>' : '') +
      '<button class="read-btn" onclick="markAsRead(this, \'' + escapeHtml(article.url).replace(/'/g, "\\'") + '\')">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M20 6L9 17l-5-5"/></svg>标记已读' +
      '</button>' +
    '</div>';
  });

  container.innerHTML = html;
  updateStats();
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  loadReadState();
  renderAllCards();
});
</script>
